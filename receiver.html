<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Bridge | Available Listings</title>

    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-bg: #f8f9fa;
            --text-dark: #212529;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
        }

        header {
            background-color: var(--primary-green);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        #searchInput {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #ddd;
            margin-bottom: 20px;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-green);
        }

        .claim-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: none;
            background: var(--primary-green);
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .no-results {
            text-align: center;
            grid-column: 1/-1;
        }
    </style>
</head>

<body>

    <header>
        <h1>Eco-Bridge</h1>
        <p>Available Donations</p>
        <a href="donor.html" style="color:white;">← Back to Donor</a>
    </header>

    <div class="container">
        <input type="text" id="searchInput" placeholder="Search items..." onkeyup="filterItems()">
        <div id="listingsContainer" class="listings-grid"></div>
    </div>

    <script>
        const STORAGE_KEY = "ecoBridge.donations.v1";

        function renderListings(filter = "") {
            const container = document.getElementById('listingsContainer');
            let listings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

            container.innerHTML = "";

            const filtered = listings.filter(item =>
                item.itemName.toLowerCase().includes(filter.toLowerCase())
            );

            if (!filtered.length) {
                container.innerHTML = `<p class="no-results">No donations available</p>`;
                return;
            }

            filtered.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <div class="item-name">${item.itemName}</div>
                    <p><b>Quantity:</b> ${item.quantity}</p>
                    <p><b>Condition:</b> ${item.condition}</p>
                    <p><b>Notes:</b> ${item.notes || 'None'}</p>
                    ${item.imageDataUrl ? `<img src="${item.imageDataUrl}" width="100%">` : ""}
                    <button class="claim-btn" onclick="claimItem('${item.id}')">Claim</button>
                `;

                container.appendChild(card);
            });
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value;
            renderListings(query);
        }

        function claimItem(id) {
            let listings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

            listings = listings.filter(item => item.id !== id);

            localStorage.setItem(STORAGE_KEY, JSON.stringify(listings));

            alert("Item claimed successfully!");
            renderListings();
        }

        renderListings();
    </script>

</body>

</html>
