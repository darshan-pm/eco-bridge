<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Bridge | Available Listings</title>
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-bg: #f8f9fa;
            --text-dark: #212529;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        header {
            background-color: var(--primary-green);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-section {
            margin-bottom: 30px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            border-color: var(--primary-green);
        }

        /* Grid Layout for Cards */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .item-name {
            font-size: 1.25rem;
            color: var(--primary-green);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-details {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .label {
            font-weight: 600;
            color: #555;
        }

        .claim-btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.3s;
        }

        .claim-btn:hover {
            opacity: 0.9;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Eco-Bridge</h1>
        <p>Connecting Resources, Reducing Waste</p>
    </header>

    <div class="container">
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search items (e.g. bread, furniture...)"
                onkeyup="filterItems()">
        </div>

        <div id="listingsContainer" class="listings-grid">
        </div>
    </div>

    <script>
        // Sample data loader for demonstration if localStorage is empty
        function initData() {
            const existing = localStorage.getItem('ecoBridgeListings');
            if (!existing) {
                const sampleListings = [
                    { id: 1, name: "Wooden Chairs", condition: "Good", quantity: "2" },
                    { id: 2, name: "Fresh Bagels", condition: "New", quantity: "6" },
                    { id: 3, name: "Winter Jacket", condition: "Like New", quantity: "1" }
                ];
                localStorage.setItem('ecoBridgeListings', JSON.stringify(sampleListings));
            }
        }

        function renderListings(filter = "") {
            const container = document.getElementById('listingsContainer');
            const listings = JSON.parse(localStorage.getItem('ecoBridgeListings')) || [];

            container.innerHTML = "";

            const filtered = listings.filter(item =>
                item.name.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = `<p class="no-results">No items found matching your search.</p>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                <div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-details">
                        <p><span class="label">Condition:</span> ${item.condition}</p>
                        <p><span class="label">Quantity:</span> ${item.quantity}</p>
                    </div>
                </div>
                <button class="claim-btn" onclick="claimItem(${item.id})">Claim Item</button>
            `;
                container.appendChild(card);
            });
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value;
            renderListings(query);
        }

        function claimItem(id) {
            alert(`Item ${id} claimed! In a full app, this would notify the donor.`);
            // Logic to remove or update item in localStorage would go here
        }

        // Initialize
        initData();
        renderListings();
    </script>

</body>

</html>
