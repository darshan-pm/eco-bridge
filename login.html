<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Bridge | Login & Signup</title>
    <style>
        :root {
            --brand: #2d6a4f;
            --brand-hover: #40916c;
            --bg-dark: #0b1410;
            --text-light: rgba(255, 255, 255, 0.92);
            --text-muted: rgba(255, 255, 255, 0.65);
            --card-bg: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(0, 0, 0, 0.3);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            background:
                radial-gradient(circle at 10% 20%, rgba(45, 106, 79, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(64, 145, 108, 0.2) 0%, transparent 40%),
                var(--bg-dark);
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 28px;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.2);
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--brand), var(--brand-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .toggle-link {
            color: var(--brand-hover);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div id="loginSection">
            <div class="header">
                <h1>Welcome Back</h1>
                <p>Login to your Eco-Bridge account</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="toggle-text">
                Don't have an account? <span class="toggle-link" onclick="toggleForms()">Sign up</span>
            </div>
        </div>

        <div id="signupSection" class="hidden">
            <div class="header">
                <h1>Join Eco-Bridge</h1>
                <p>Help us reduce waste together</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPass" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirmPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div class="toggle-text">
                Already have an account? <span class="toggle-link" onclick="toggleForms()">Login</span>
            </div>
        </div>
    </div>

    <script>
        const USERS_KEY = "ecoBridgeUsers";
        const CURRENT_USER_KEY = "ecoBridgeCurrentUser";

        // DOM Elements
        const loginSection = document.getElementById('loginSection');
        const signupSection = document.getElementById('signupSection');

        // Toggle function
        function toggleForms() {
            loginSection.classList.toggle('hidden');
            signupSection.classList.toggle('hidden');
        }

        // --- Helper: Get Users ---
        function getUsers() {
            const users = localStorage.getItem(USERS_KEY);
            return users ? JSON.parse(users) : [];
        }

        // --- SIGNUP LOGIC ---
        document.getElementById('signupForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPass').value;
            const confirmPass = document.getElementById('signupConfirmPass').value;

            // 1. Check passwords match
            if (pass !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            const users = getUsers();

            // 2. Check if email exists
            const userExists = users.some(u => u.email === email);
            if (userExists) {
                alert("An account with this email already exists.");
                return;
            }

            // 3. Save User
            const newUser = { name, email, password: pass };
            users.push(newUser);
            localStorage.setItem(USERS_KEY, JSON.stringify(users));

            alert("Signup successful! You can now login.");
            toggleForms();
            document.getElementById('signupForm').reset();
        });

        // --- LOGIN LOGIC ---
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;

            const users = getUsers();

            // Find user
            const user = users.find(u => u.email === email && u.password === pass);

            if (user) {
                // Store current session
                localStorage.setItem(CURRENT_USER_KEY, email);

                // Redirect
                window.location.href = "donor.html";
            } else {
                alert("Invalid email or password. Please try again.");
            }
        });
    </script>
</body>

</html>
