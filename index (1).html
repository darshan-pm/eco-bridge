<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eco-Bridge AI | Donor</title>
    <style>
        :root {
            --bg: #0b1410;
            --text: #fff;
            --brand: #2d6a4f;
            --brand-2: #40916c;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }

        .wrap {
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #cameraContainer {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--brand);
        }

        video,
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: 0;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #fff;
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h2 style="margin-top:0">Eco-Bridge AI</h2>
            <div id="cameraContainer">
                <video id="cameraFeed" autoplay playsinline muted></video>
                <canvas id="hiddenCanvas" class="hidden"></canvas>
                <img id="imagePreview" class="hidden">
            </div>

            <div id="status" style="text-align:center; padding:10px; color:var(--brand-2);" class="hidden">✨ Gemini AI
                Analyzing...</div>

            <button id="captureBtn" class="btn btn-primary">📸 CAPTURE PHOTO</button>
            <button id="retakeBtn" class="btn btn-ghost hidden">RETAKE</button>

            <input type="text" id="itemName" placeholder="Item Name">
            <textarea id="itemDetails" rows="3" placeholder="AI Analysis Details"></textarea>

            <!-- NEW: Button to save data to the Marketplace -->
            <button id="listBtn" class="btn btn-primary" style="margin-top: 20px; background: var(--brand-2);">🚀 LIST
                RESOURCE</button>
            <p style="text-align:center; font-size:12px; color:gray; margin-top:10px;">Click to share with Receivers</p>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@google/generative-ai": "https://esm.run" } }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const API_KEY = "AIzaSyDQFtQP0BnJ2N3eK3hPQ7_Xh-9cz4e7Ee8";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('hiddenCanvas');
        const preview = document.getElementById('imagePreview');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const status = document.getElementById('status');
        const listBtn = document.getElementById('listBtn');

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }, audio: false
                });
                video.srcObject = stream;
            } catch (e) { alert("ERROR: Use HTTPS or Localhost Server!"); }
        }

        captureBtn.onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');

            preview.src = dataUrl;
            preview.classList.remove('hidden');
            video.classList.add('hidden');
            captureBtn.classList.add('hidden');
            retakeBtn.classList.remove('hidden');

            analyze(dataUrl.split(',')[1]);
        };

        retakeBtn.onclick = () => {
            video.classList.remove('hidden');
            preview.classList.add('hidden');
            captureBtn.classList.remove('hidden');
            retakeBtn.classList.add('hidden');
            document.getElementById('itemName').value = "";
            document.getElementById('itemDetails').value = "";
        };

        async function analyze(base64) {
            status.classList.remove('hidden');
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent([
                    "Identify this item. Return JSON: {\"n\":\"name\",\"d\":\"details\"}",
                    { inlineData: { data: base64, mimeType: "image/jpeg" } }
                ]);
                const data = JSON.parse(result.response.text().replace(/```json|```/g, ""));
                document.getElementById('itemName').value = data.n;
                document.getElementById('itemDetails').value = data.d;
            } catch (e) { alert("AI Error. Check Key."); }
            status.classList.add('hidden');
        }

        // SAVING TO LOCALSTORAGE
        listBtn.onclick = () => {
            const name = document.getElementById('itemName').value;
            const details = document.getElementById('itemDetails').value;

            if (!name) {
                alert("Please capture an item first!");
                return;
            }

            // Create item object
            const newItem = {
                name: name,
                details: details,
                id: Date.now()
            };

            // Get existing items or empty list
            let items = JSON.parse(localStorage.getItem('ecoBridgeItems')) || [];
            items.push(newItem);

            // Save back
            localStorage.setItem('ecoBridgeItems', JSON.stringify(items));

            alert("✅ Item Listed! Check Receiver page.");
            window.location.href = "receiver.html";
        };

        init();
    </script>
</body>

</html>
